workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PhonoQuest Build
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.phonoquest
    scripts:
      - flutter pub get
      - xcode-project use-profiles
      - flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true